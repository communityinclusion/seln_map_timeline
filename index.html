<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive map showing State Employment Leadership Network (SELN) membership timeline from 2007 to 2026">
  <title>State Employment Leadership Network Membership Timeline (2007-2026)</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Skip to main content link for accessibility -->
  <a href="#main-content" class="sr-only">Skip to main content</a>

  <div class="container">
    <!-- Header -->
    <header>
      <h1 style="font-variant-caps: small-caps;"><img src="/assets/seln_logo.png" alt="State Employment Leadership Network logo" style="border-bottom: 1px solid #5D9632; max-width: 240px;"> 
        <br>-= Bythe Numbers =-</h1>
    </header>

    <!-- Main Content -->
    <main id="main-content">
      
      <!-- Map and Controls Section -->
      <section class="map-section" aria-label="Interactive map with year controls">
          <header>
      <h2>State Employment Leadership Network Membership Timeline (2007-2026)</h2>
    </header>
        <!-- Year Slider Controls -->
        <div class="controls">
          <div class="slider-container">
            <div class="slider-label">
              <span>Select Year:</span>
              <span id="current-year" aria-live="polite">2007</span>
            </div>

            <input
              type="range"
              id="year-slider"
              min="2007"
              max="2026"
              value="2007"
              step="1"
              aria-label="Year slider from 2007 to 2026"
              aria-valuemin="2007"
              aria-valuemax="2026"
              aria-valuenow="2007"
              aria-valuetext="2007"
            >

            <div class="year-range">
              <span>2007</span>
              <span>2026</span>
            </div>
          </div>
        </div>

        <!-- Map Container -->
        <div id="map-container" role="img" aria-label="United States map showing SELN membership by state">
          <!-- Loading indicator -->
          <div id="loading" aria-live="polite" style="position: absolute;">
            Loading map data...
          </div>

          <!-- D3.js will render the SVG map here -->
          <svg id="map-svg" aria-label="Interactive United States choropleth map"></svg>
        </div>
            <!-- Legend -->
      <section class="legend" role="complementary" aria-label="Map legend">
        <div class="legend-item">
          <div class="legend-color member" role="img" aria-label="Green color"></div>
          <span class="legend-text">SELN Member</span>
        </div>
        <div class="legend-item">
          <div class="legend-color non-member" role="img" aria-label="Grey color"></div>
          <span class="legend-text">Not a Member</span>
        </div>
      </section>
      </section>

  

      <!-- Years of Membership Section -->
      <section class="years-section" aria-label="Years of membership by state">
        <header>
          <h2>Years of SELN Membership</h2>
        </header>

        <div id="years-content">
          <!-- Content will be populated by JavaScript -->
          <p class="loading-text">Loading membership data...</p>
        </div>
      </section>

      <!-- Error Display -->
      <div id="error" role="alert" aria-live="assertive" style="display: none;"></div>

      <!-- ARIA Live Region for Screen Reader Announcements -->
      <div id="aria-live-region" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    </main>
  </div>

  <!-- D3.js and TopoJSON from CDN -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>

  <!-- Application Scripts -->
  <script src="js/dataParser.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
